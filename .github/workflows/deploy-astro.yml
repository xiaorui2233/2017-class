name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ "master" ]
    paths:
      - "frontend/**"
      - "assets/uploads/**"
      - ".github/workflows/deploy-astro.yml"
  workflow_dispatch:




permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Copy uploads into frontend public
        run: |
          if [ -d "assets/uploads" ]; then
            mkdir -p "frontend/public/assets/uploads"
            cp -r "assets/uploads/." "frontend/public/assets/uploads/"
          fi

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
