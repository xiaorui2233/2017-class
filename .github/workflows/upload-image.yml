name: Upload Image

on:
  repository_dispatch:
    types: [upload_image]

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch file
        run: |
          if [ -z "${TEMP_URL}" ]; then
            echo "temp_url missing" && exit 1
          fi
          mkdir -p "${UPLOAD_PATH}"
          curl -L "${TEMP_URL}?token=${TEMP_TOKEN}" -o "${UPLOAD_PATH}/${FILE_NAME}"
        env:
          UPLOAD_PATH: ${{ github.event.client_payload.upload_path }}
          FILE_NAME: ${{ github.event.client_payload.filename }}
          TEMP_URL: ${{ github.event.client_payload.temp_url }}
          TEMP_TOKEN: ${{ github.event.client_payload.temp_token }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Upload image"
          git push origin HEAD:${{ github.event.client_payload.branch || 'main' }}
